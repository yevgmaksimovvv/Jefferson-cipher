<aside id="cipher-result" class="card result-card">
  <div class="card-row result-card-header">
    <h2 class="section-title">Результат</h2>
    {% if result %}
      <button type="button" class="btn btn-secondary btn-ghost result-copy-button" data-copy-button data-copy-target="cipher-output">
        Скопировать
      </button>
    {% endif %}
  </div>

  {% if alert and alert.kind != 'success' %}
    <div class="alert alert-error">
      {{ alert.message }}
    </div>
  {% endif %}

  {% if result %}
    <pre id="cipher-output" class="result-text">{{ result.text }}</pre>
  {% else %}
    <div class="result-empty">Здесь появится результат после выполнения операции.</div>
  {% endif %}
</aside>
